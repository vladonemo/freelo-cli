                    type: object
                    nullable: true
                    properties:
                      amount:
                        type: integer
                      currency:
                        type: string
                      is_fixed:
                        type: boolean

    ProjectLabel:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        color:
          type: string
          nullable: true
        is_private:
          type: boolean
        users_id:
          type: integer
        usage_count:
          type: integer
        can_be_public:
          type: boolean
        can_be_edited:
          type: boolean

    PinnedItem:
      type: object
      properties:
        id:
          type: integer
        link:
          type: string
          format: uri
        title:
          type: string

    TasklistWithBudget:
      allOf:
        - $ref: '#/components/schemas/TasklistBasic'
        - type: object
          properties:
            budget:
              $ref: '#/components/schemas/Currency'

    TasklistFull:
      allOf:
        - $ref: '#/components/schemas/TasklistBasic'
        - type: object
          properties:
            date_add:
              type: string
              format: date-time
            date_edited_at:
              type: string
              format: date-time
            state:
              $ref: '#/components/schemas/State'
            project:
              allOf:
                - $ref: '#/components/schemas/ProjectBasic'
                - type: object
                  properties:
                    state:
                      $ref: '#/components/schemas/State'
            real_minutes_spent:
              type: integer
            budget:
              $ref: '#/components/schemas/Currency'
            real_cost:
              $ref: '#/components/schemas/Currency'

    TasklistDetail:
      allOf:
        - $ref: '#/components/schemas/TasklistBasic'
        - type: object
          properties:
            project_id:
              type: integer
            date_add:
              type: string
              format: date-time
            date_edited_at:
              type: string
              format: date-time
            tasks:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  due_date:
                    type: string
                    format: date-time
                    nullable: true
                  due_date_end:
                    type: string
                    format: date-time
                    nullable: true
                  worker:
                    $ref: '#/components/schemas/UserBasic'
                  parent_task_id:
                    type: integer
                    nullable: true

    TaskLabel:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
        name:
          type: string
        color:
          type: string

    TaskLabelAddInput:
      description: >
        Two input modes:
        (1) UUID only — reference an existing label by UUID, assigned as-is.
        (2) Name-based — name is required; color defaults to #77787a if omitted; uuid is auto-generated if omitted.
        Matching is by name+color — if an existing label matches both, it is reused; otherwise a new label is created.
      oneOf:
        - type: object
          description: Reference an existing label by UUID.
          required:
            - uuid
          properties:
            uuid:
              type: string
              format: uuid
          additionalProperties: false
        - type: object
          description: Create or match a label by name and color.
          required:
            - name
          properties:
            name:
              type: string
            color:
              type: string
              default: '#77787a'
              description: 'Label color hex code. Defaults to #77787a (gray) if not provided.'
            uuid:
              type: string
              format: uuid
              description: 'Optional UUID for the label. Auto-generated if omitted.'

    TaskLabelRemoveInput:
      description: >
        Three input modes:
        (1) UUID — removes the label identified by UUID.
        (2) Name only — removes all labels with that name regardless of color.
        (3) Name + color — removes the label matching both name and color.
      oneOf:
        - type: object
          description: Remove a label by UUID.
          required:
            - uuid
          properties:
            uuid:
              type: string
              format: uuid
          additionalProperties: false
        - type: object
          description: Remove all labels with the given name (any color).
          required:
            - name
          properties:
            name:
              type: string
          additionalProperties: false
        - type: object
          description: Remove the label matching both name and color.
          required:
            - name
            - color
          properties:
            name:
              type: string
            color:
              type: string

    TimeEstimate:
      type: object
      properties:
        minutes:
          type: integer

    UserTimeEstimate:
      type: object
      properties:
        minutes:
          type: integer
        user:
          $ref: '#/components/schemas/UserBasic'

    TaskSummary:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        date_add:
          type: string
          format: date-time
        date_edited_at:
          type: string
          format: date-time
        due_date:
          type: string
          format: date-time
          nullable: true
        due_date_end:
          type: string
          format: date-time
          nullable: true
        count_comments:
